<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="300">
<title>Grupo MOC — Tablero de Operaciones</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@300;400;600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --blue:        #1433CC;
    --blue-hover:  #1229b0;
    --blue-light:  #e8eeff;
    --blue-faint:  #f0f4ff;
    --white:       #ffffff;
    --gray-100:    #f7f8fc;
    --gray-200:    #e8ecf5;
    --gray-400:    #9ba8c4;
    --gray-700:    #3a4568;
    --gray-900:    #1a2040;
    --shadow-sm:   0 1px 4px rgba(20,51,204,0.08);
    --shadow-md:   0 4px 16px rgba(20,51,204,0.12);
    --shadow-lg:   0 8px 32px rgba(20,51,204,0.16);
    --radius:      10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--gray-100);
    color: var(--gray-900);
    font-family: 'Inter', 'Segoe UI', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, var(--blue) 0%, #1e45e8 100%);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    right: -60px; top: -60px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    pointer-events: none;
  }
  .header::before {
    content: '';
    position: absolute;
    right: 80px; bottom: -80px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    pointer-events: none;
  }

  .logo-area { display: flex; align-items: center; gap: 14px; z-index: 1; }
  .logo-img  { height: 52px; filter: brightness(0) invert(1); drop-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .logo-text h1 { font-family: 'Oswald', sans-serif; font-size: 1.6rem; font-weight: 600; color: #fff; letter-spacing: .10em; }
  .logo-text p  { font-family: 'Inter', sans-serif; font-size: 0.75rem; color: rgba(255,255,255,0.75); letter-spacing: .10em; text-transform: uppercase; margin-top: 1px; }

  .clock-area { text-align: right; z-index: 1; }
  .clock      { font-family: 'Share Tech Mono', monospace; font-size: 2.4rem; color: #fff; letter-spacing: .08em; line-height: 1; }
  .clock-date { font-size: 0.78rem; color: rgba(255,255,255,0.70); letter-spacing: .06em; margin-top: 4px; }




  .logo-img  { height: 58px; width: auto; object-fit: contain; filter: drop-shadow(0 1px 4px rgba(0,0,0,0.25)); }
  /* ── SELECTOR DE MES ── */
  .month-bar {
    background: var(--white);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    border-bottom: 1px solid var(--gray-200);
    box-shadow: var(--shadow-sm);
  }
  .month-btn {
    background: var(--blue-faint);
    border: 1px solid var(--blue-light);
    color: var(--blue);
    padding: 6px 22px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.82rem;
    letter-spacing: .07em;
    cursor: pointer;
    border-radius: 20px;
    transition: all .2s;
    font-weight: 400;
  }
  .month-btn:hover    { background: var(--blue); color: #fff; border-color: var(--blue); box-shadow: var(--shadow-sm); }
  .month-btn:disabled { opacity: .35; cursor: default; }
  .month-label {
    font-family: 'Oswald', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--blue);
    letter-spacing: .14em;
    min-width: 220px;
    text-align: center;
  }

  /* ── NAV BAR ── */
  .nav-bar {
    background: var(--white);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--blue-light);
  }
  .nav-btn {
    background: var(--blue);
    border: none;
    color: #fff;
    padding: 8px 22px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.85rem;
    letter-spacing: .07em;
    cursor: pointer;
    border-radius: 6px;
    transition: all .2s;
    box-shadow: var(--shadow-sm);
  }
  .nav-btn:hover { background: var(--blue-hover); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .nav-date {
    font-family: 'Oswald', sans-serif;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--gray-900);
    letter-spacing: .08em;
    text-align: center;
  }
  .nav-date span { color: var(--blue); }

  /* ── KPI STRIP ── */
  .kpi-strip {
    display: flex;
    gap: 16px;
    padding: 16px 32px;
    background: var(--gray-100);
    border-bottom: 1px solid var(--gray-200);
  }
  .kpi {
    flex: 1;
    padding: 14px 12px;
    text-align: center;
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    border-top: 3px solid var(--gray-200);
    transition: box-shadow .2s;
  }
  .kpi:hover { box-shadow: var(--shadow-md); }
  .kpi-num  { font-size: 2rem; font-weight: 700; font-family: 'Share Tech Mono', monospace; line-height: 1; }
  .kpi-lbl  { font-size: 0.65rem; letter-spacing: .10em; color: var(--gray-400); margin-top: 4px; text-transform: uppercase; font-family: 'Inter', sans-serif; }

  .kpi.total      { border-top-color: var(--blue); }
  .kpi.total      .kpi-num { color: var(--blue); }
  .kpi.servicio   { border-top-color: #0288d1; }
  .kpi.servicio   .kpi-num { color: #0288d1; }
  .kpi.disponible { border-top-color: #2e7d32; }
  .kpi.disponible .kpi-num { color: #2e7d32; }
  .kpi.taller     { border-top-color: #c62828; }
  .kpi.taller     .kpi-num { color: #c62828; }
  .kpi.vacios     { border-top-color: #f57f17; }
  .kpi.vacios     .kpi-num { color: #f57f17; }
  .kpi.descanso   { border-top-color: #546e7a; }
  .kpi.descanso   .kpi-num { color: #546e7a; }

  /* ── TABLA BOARD ── */
  .board-wrap { padding: 20px 32px; }

  table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.88rem; background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-md); overflow: hidden; }
  thead tr { background: var(--blue); }
  thead th {
    padding: 12px 16px;
    text-align: left;
    font-size: 0.70rem;
    letter-spacing: .13em;
    color: rgba(255,255,255,0.90);
    font-weight: 600;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }
  tbody tr { border-bottom: 1px solid var(--gray-200); transition: background .12s; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--blue-faint); }
  tbody td { padding: 10px 16px; vertical-align: middle; }

  .td-unidad {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem; font-weight: 700; color: var(--gray-900);
    white-space: nowrap; width: 90px;
  }
  .flota-badge {
    display: inline-block; font-size: 0.58rem; padding: 2px 6px;
    border-radius: 10px; margin-left: 5px; vertical-align: middle;
    letter-spacing: .05em; font-family: 'Inter', sans-serif; font-weight: 600;
  }
  .flota-propia { background: var(--blue-light); color: var(--blue); }
  .flota-sub    { background: #ede7f6; color: #6a1b9a; }

  .td-operador  { color: var(--gray-700); font-size: 0.82rem; width: 240px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px; font-family: 'Inter', sans-serif; }
  .td-actividad { color: var(--gray-900); font-size: 0.83rem; font-family: 'Inter', sans-serif; font-weight: 500; }

  /* Status badge */
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 14px; border-radius: 20px; font-size: 0.72rem;
    font-weight: 600; letter-spacing: .07em; white-space: nowrap;
    min-width: 130px; justify-content: center;
    font-family: 'Inter', sans-serif;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .s-servicio   { background: #e3f2fd; color: #0277bd; border: 1px solid #b3e5fc; }
  .s-servicio   .dot { background: #0288d1; box-shadow: 0 0 5px #4fc3f7; }
  .s-disponible { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
  .s-disponible .dot { background: #43a047; box-shadow: 0 0 5px #81c784; }
  .s-taller     { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
  .s-taller     .dot { background: #e53935; box-shadow: 0 0 5px #ef9a9a; }
  .s-vacios     { background: #fff8e1; color: #e65100; border: 1px solid #ffe082; }
  .s-vacios     .dot { background: #f57c00; }
  .s-descanso   { background: #eceff1; color: #546e7a; border: 1px solid #cfd8dc; }
  .s-descanso   .dot { background: #78909c; }
  .s-viaje      { background: #e1f5fe; color: #0277bd; border: 1px solid #b3e5fc; }
  .s-viaje      .dot { background: #29b6f6; animation: pulse 1.5s infinite; }
  .s-regreso    { background: #fff3e0; color: #e65100; border: 1px solid #ffe0b2; }
  .s-regreso    .dot { background: #fb8c00; }
  .s-pendiente  { background: #f3e5f5; color: #6a1b9a; border: 1px solid #e1bee7; }
  .s-pendiente  .dot { background: #8e24aa; }
  .s-otro       { background: var(--gray-100); color: var(--gray-400); border: 1px solid var(--gray-200); }
  .s-otro       .dot { background: var(--gray-400); }

  @keyframes pulse {
    0%,100% { opacity:1; box-shadow: 0 0 4px #29b6f6; }
    50%      { opacity:.4; box-shadow: 0 0 10px #29b6f6; }
  }

  tbody tr:nth-child(even) { background: var(--gray-100); }
  tbody tr:nth-child(even):hover { background: var(--blue-faint); }

  /* Footer */
  .footer {
    text-align: center; padding: 14px;
    font-size: 0.68rem; color: var(--gray-400);
    letter-spacing: .07em;
    font-family: 'Inter', sans-serif;
    border-top: 1px solid var(--gray-200);
    background: var(--white);
  }
  .last-update { font-size: 0.68rem; color: var(--gray-400); letter-spacing: .05em; }

  /* No data */
  .no-data { text-align: center; padding: 60px; color: var(--gray-400); font-size: 1.1rem; letter-spacing: .10em; }

  /* ── CAMIONES ANIMADOS ── */
  .td-truck { width: 68px; text-align: center; padding: 6px 4px !important; }
  .truck-wrap {
    display: inline-flex; flex-direction: column; align-items: center;
    gap: 2px; padding: 5px 7px; border-radius: 10px; min-width: 56px;
  }
  .truck-emoji { font-size: 1.35rem; line-height: 1; display: block; }
  .truck-sub   { font-size: 0.55rem; font-weight: 700; letter-spacing: .04em; display: block; white-space: nowrap; }

  /* Colores por estado */
  .tw-servicio   { background: #e3f2fd; color: #0277bd; }
  .tw-viaje      { background: #e1f5fe; color: #0288d1; }
  .tw-regreso    { background: #fff3e0; color: #e65100; }
  .tw-vacios     { background: #fff8e1; color: #f9a825; }
  .tw-taller     { background: #ffebee; color: #c62828; }
  .tw-disponible { background: #e8f5e9; color: #2e7d32; }
  .tw-descanso   { background: #eceff1; color: #546e7a; }
  .tw-pendiente  { background: #f3e5f5; color: #6a1b9a; }
  .tw-otro       { background: #f5f5f5; color: #9e9e9e; }

  /* Animaciones */
  @keyframes truckDrive   { 0%,100%{transform:translateX(-5px)} 50%{transform:translateX(5px)} }
  @keyframes truckFast    { 0%,100%{transform:translateX(-6px)} 50%{transform:translateX(6px)} }
  @keyframes truckReturn  { 0%,100%{transform:scaleX(-1) translateX(-5px)} 50%{transform:scaleX(-1) translateX(5px)} }
  @keyframes truckBounce  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  @keyframes truckPulse   { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(.8);opacity:.4} }
  @keyframes truckShake   { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-10deg)} 75%{transform:rotate(10deg)} }
  @keyframes truckDrift   { 0%,100%{transform:translateX(-3px);opacity:.7} 50%{transform:translateX(3px);opacity:1} }
  @keyframes truckSleep   { 0%,100%{opacity:.5} 50%{opacity:.8} }

  .tw-servicio  .truck-emoji { animation: truckDrive  .8s ease-in-out infinite; }
  .tw-viaje     .truck-emoji { animation: truckFast   .4s ease-in-out infinite; }
  .tw-regreso   .truck-emoji { animation: truckReturn .8s ease-in-out infinite; }
  .tw-vacios    .truck-emoji { animation: truckDrift  2s  ease-in-out infinite; }
  .tw-taller    .truck-emoji { animation: truckPulse  1s  ease-in-out infinite; }
  .tw-disponible .truck-emoji{ animation: truckBounce 2.5s ease-in-out infinite; }
  .tw-descanso  .truck-emoji { animation: truckSleep  2s  ease-in-out infinite; }
  .tw-pendiente .truck-emoji { animation: truckShake  .8s ease-in-out infinite; }
</style>
</head>

const ULTIMA_ACT = "30/04/2026 12:08:46";

// ── ESTADO ──
const MESES_NOMBRES = ["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO",
                       "AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];

// mesKeys ordenados ascendente → el ultimo es el mas reciente
const mesKeys = Object.keys(MESES).sort();
let currentMesIdx = mesKeys.length - 1;  // empieza en el mes mas reciente

function getMesData()  { return MESES[mesKeys[currentMesIdx]] || []; }
function getDatesForMes() {
  return [...new Set(getMesData().map(r => r.Fecha))].sort();
}

let dates = [];
let currentDateIdx = 0;

function initMes(goToToday = false) {
  if (goToToday) {
    // Buscar el mes que contiene el dia de hoy
    const today = new Date().toISOString().slice(0, 10);
    const todayMesKey = today.slice(0, 7); // "yyyy-MM"
    const todayMesIdx = mesKeys.indexOf(todayMesKey);
    if (todayMesIdx >= 0) {
      // El mes de hoy esta en los datos -> ir a ese mes y al dia de hoy
      currentMesIdx = todayMesIdx;
      dates = getDatesForMes();
      const todayIdx = dates.indexOf(today);
      currentDateIdx = todayIdx >= 0 ? todayIdx : 0;
    } else {
      // El mes de hoy no existe -> usar el mes mas reciente, dia 1
      currentMesIdx = mesKeys.length - 1;
      dates = getDatesForMes();
      currentDateIdx = 0;
    }
  } else {
    // Al cambiar de mes siempre empezar desde el dia 1
    dates = getDatesForMes();
    currentDateIdx = 0;
  }
  // Etiqueta del mes
  const key = mesKeys[currentMesIdx];
  const [yr, mo] = key.split("-");
  document.getElementById("mesLabel").textContent =
    MESES_NOMBRES[parseInt(mo) - 1] + " " + yr;
  // Deshabilitar botones en extremos
  const btnA = document.getElementById("btnMesAnterior");
  const btnS = document.getElementById("btnMesSiguiente");
  if (btnA) btnA.disabled = (currentMesIdx === 0);
  if (btnS) btnS.disabled = (currentMesIdx === mesKeys.length - 1);
}

function changeMes(dir) {
  currentMesIdx = Math.max(0, Math.min(mesKeys.length - 1, currentMesIdx + dir));
  initMes(false);  // al cambiar mes -> dia 1
  render();
}

  "Festivo/Descanso": { emoji: "💤", sub: "DESCANSO",  cls: "tw-descanso"   },

  "Sin asignar":      { emoji: "🚛", sub: "—",         cls: "tw-otro"       },
  "Otro":             { emoji: "🚛", sub: "ACTIVO",    cls: "tw-otro"       }
};
function render() {
  const dateStr  = dates[currentDateIdx];
  const tbody    = document.getElementById("boardBody");
  const noData   = document.getElementById("noData");

  if (!dateStr) {
    document.getElementById("navDate").innerHTML = "<span>SIN DATOS</span>";
    ["kTotal","kServicio","kDisp","kTaller","kVacios","kDescanso"]
      .forEach(id => { document.getElementById(id).textContent = "—"; });
    tbody.innerHTML = "";
    noData.style.display = "block";
    return;
  }

  const rows = getMesData().filter(r => r.Fecha === dateStr);

  // ── Nav date ──
  const d = new Date(dateStr + "T12:00:00");
  const diasN  = ["DOMINGO","LUNES","MARTES","MIÉRCOLES","JUEVES","VIERNES","SÁBADO"];
  const mesesN = ["ENERO","FEBRERO","MARZO","ABRIL","MAYO","JUNIO","JULIO",
                  "AGOSTO","SEPTIEMBRE","OCTUBRE","NOVIEMBRE","DICIEMBRE"];
  document.getElementById("navDate").innerHTML =
    `<span>${diasN[d.getDay()]}</span> ${d.getDate()} DE ${mesesN[d.getMonth()]} ${d.getFullYear()}`;

  // ── KPIs ──
  const c = { servicio:0, disponible:0, taller:0, vacios:0, descanso:0 };
  rows.forEach(r => {
    if (r.Categoria === "En Servicio" || r.Categoria === "En Viaje") c.servicio++;
    else if (r.Categoria === "Disponible")       c.disponible++;
    else if (r.Categoria === "Taller")           c.taller++;
    else if (r.Categoria === "Vacios" || r.Categoria === "Regreso") c.vacios++;
    else if (r.Categoria === "Festivo/Descanso") c.descanso++;
  });
  document.getElementById("kTotal").textContent    = rows.length;
  document.getElementById("kServicio").textContent  = c.servicio;
  document.getElementById("kDisp").textContent      = c.disponible;
  document.getElementById("kTaller").textContent    = c.taller;
  document.getElementById("kVacios").textContent    = c.vacios;
  document.getElementById("kDescanso").textContent  = c.descanso;

  // ── Tabla ──
  tbody.innerHTML = "";
  if (rows.length === 0) { noData.style.display = "block"; return; }
  noData.style.display = "none";

  rows.forEach(r => {
    const st = STATUS_MAP[r.Categoria] || STATUS_MAP["Otro"];
    const flotaCls = r.Flota === "Subcontratada" ? "flota-sub" : "flota-propia";
    const flotaTxt = r.Flota === "Subcontratada" ? "SUB" : "OWN";
    const tk = TRUCK_MAP[r.Categoria] || TRUCK_MAP["Otro"];
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="td-unidad">${r.Unidad}<span class="flota-badge ${flotaCls}">${flotaTxt}</span></td>
      <td class="td-operador" title="${r.Operador}">${r.Operador || '—'}</td>
      <td class="td-actividad">${r.Actividad || '—'}</td>
      <td><span class="status-badge ${st.cls}"><span class="dot"></span>${st.label}</span></td>
      <td class="td-truck"><div class="truck-wrap ${tk.cls}"><span class="truck-emoji">${tk.emoji}</span><span class="truck-sub">${tk.sub}</span></div></td>
    `;
    tbody.appendChild(tr);
  });
}

function changeDay(dir) {
  currentDateIdx = Math.max(0, Math.min(dates.length - 1, currentDateIdx + dir));
  render();
}

function updateClock() {
  const now = new Date();
  const hh  = String(now.getHours()).padStart(2,'0');
  const mm  = String(now.getMinutes()).padStart(2,'0');
  const ss  = String(now.getSeconds()).padStart(2,'0');
  document.getElementById("clock").textContent = `${hh}:${mm}:${ss}`;
  const diasR  = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  const mesesR = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio",
                  "Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  document.getElementById("clockDate").textContent =
    `${diasR[now.getDay()]} ${now.getDate()} de ${mesesR[now.getMonth()]} ${now.getFullYear()}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── ULTIMA ACTUALIZACION ──
const luEl = document.getElementById("lastUpdate");
if (luEl && ULTIMA_ACT) luEl.textContent = "Actualizado: " + ULTIMA_ACT;

// ── TECLADO ──
document.addEventListener("keydown", e => {
  if (e.key === "ArrowLeft")  changeDay(-1);
  if (e.key === "ArrowRight") changeDay(1);
});

initMes(true);  // al abrir -> dia de hoy
render();
</script>
</body>
</html>
